<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>高一化學：化學鍵互動練習</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #5f6f7c;
        --line: #d8e0e7;
        --bg: #f7fafc;
        --panel: #ffffff;
        --blue: #1f6feb;
        --green: #16833a;
        --red: #c0352b;
        --gold: #b7791f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
        color: var(--ink);
        background: var(--bg);
        line-height: 1.6;
      }

      header {
        background: #0f2f4a;
        color: white;
        padding: 32px 20px;
      }

      .wrap {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
      }

      .hero {
        display: grid;
        grid-template-columns: 1.6fr 1fr;
        gap: 24px;
        align-items: end;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 10px;
        font-size: clamp(2rem, 4vw, 3.6rem);
        line-height: 1.15;
      }

      .hero p {
        max-width: 720px;
        margin-bottom: 0;
        color: #d9e8f4;
      }

      .status-panel {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 8px;
        padding: 16px;
      }

      .status-panel strong {
        display: block;
        font-size: 1.5rem;
      }

      main {
        padding: 26px 0 48px;
      }

      .toolbar,
      .lesson-video,
      .question-card,
      .result,
      .participants,
      .notice {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 420px);
        gap: 12px;
        padding: 16px;
        margin-bottom: 18px;
      }

      .lesson-video {
        padding: 18px;
        margin-bottom: 18px;
      }

      .lesson-video h2 {
        margin-bottom: 6px;
      }

      .lesson-video p {
        color: var(--muted);
        margin-bottom: 14px;
      }

      .video-frame {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border-radius: 8px;
        background: #d8e0e7;
      }

      .video-frame iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      label span {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      input[type="text"],
      input[type="number"] {
        width: 100%;
        min-height: 44px;
        padding: 10px 12px;
        border: 1px solid #b7c4ce;
        border-radius: 6px;
        font: inherit;
      }

      .question-list {
        display: grid;
        gap: 14px;
      }

      .question-card {
        padding: 18px;
      }

      .question-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .question-meta span {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 10px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .question-card h3 {
        margin-bottom: 14px;
        font-size: 1.12rem;
      }

      .options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .option {
        display: flex;
        gap: 10px;
        min-height: 48px;
        align-items: center;
        border: 1px solid #c7d2dc;
        border-radius: 7px;
        padding: 10px 12px;
        background: #fbfdff;
        cursor: pointer;
      }

      .option:hover {
        border-color: var(--blue);
      }

      .option span {
        margin: 0;
        color: var(--ink);
      }

      .feedback {
        margin: 14px 0 0;
        padding: 12px;
        border-radius: 7px;
        display: none;
      }

      .is-correct {
        border-color: rgba(22, 131, 58, 0.45);
      }

      .is-correct .feedback {
        display: block;
        background: #eaf7ee;
        color: #125c2d;
      }

      .is-wrong {
        border-color: rgba(192, 53, 43, 0.45);
      }

      .is-wrong .feedback {
        display: block;
        background: #fff0ee;
        color: #85231d;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin: 20px 0;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 7px;
        padding: 10px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .primary {
        background: var(--blue);
        color: white;
      }

      .secondary {
        background: #e8eef5;
        color: #1f3345;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .submit-status {
        min-height: 28px;
        margin: 0;
        color: var(--muted);
      }

      .result {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 18px;
        padding: 18px;
        margin-top: 16px;
      }

      .score-ring {
        width: 118px;
        height: 118px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        align-content: center;
        background: #edf6ff;
        color: var(--blue);
        border: 8px solid #c9e1ff;
        font-size: 2.25rem;
        font-weight: 900;
      }

      .score-ring span {
        display: block;
        font-size: 0.9rem;
      }

      .notice {
        margin-top: 18px;
        padding: 14px 16px;
        color: #6a4a11;
        background: #fff8e8;
        border-color: #edd399;
      }

      .participants {
        margin-top: 16px;
        padding: 18px;
      }

      .participants-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
        margin-bottom: 12px;
      }

      .participants-head p {
        margin-bottom: 0;
        color: var(--muted);
      }

      .participant-count {
        white-space: nowrap;
        color: var(--blue);
        font-weight: 800;
      }

      .participant-list {
        display: grid;
        gap: 8px;
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .participant-row {
        display: grid;
        grid-template-columns: 1fr 1.4fr;
        gap: 10px;
        align-items: center;
        min-height: 40px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fbfdff;
      }

      .participant-row time,
      .participant-empty,
      .participant-status {
        color: var(--muted);
      }

      footer {
        padding: 28px 0;
        color: var(--muted);
        border-top: 1px solid var(--line);
      }

      @media (max-width: 760px) {
        .hero,
        .toolbar,
        .options,
        .result,
        .participant-row {
          grid-template-columns: 1fr;
        }

        .participants-head {
          display: block;
        }

        header {
          padding: 26px 0;
        }

        .score-ring {
          width: 100px;
          height: 100px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap hero">
        <div>
          <h1>化學鍵互動練習</h1>
          <p>從價電子、八隅體、離子鍵、共價鍵到金屬鍵，完成練習後會看到分數與錯題解析。</p>
        </div>
        <div class="status-panel">
          <span>本次練習</span>
          <strong id="questionCount">-- 題</strong>
          <small>高一化學 Chemical Bonding</small>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section class="lesson-video" aria-label="影片解說">
        <h2>先看影片解說</h2>
        <p>看完化學鍵重點整理後，再完成下面的互動練習。</p>
        <div class="video-frame">
          <iframe
            src="https://www.youtube.com/embed/ZyPhAY4E698"
            title="化學鍵影片解說"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen></iframe>
        </div>
      </section>

      <form id="practiceForm" novalidate>
        <section class="toolbar" aria-label="學生資料">
          <label>
            <span>班級座號</span>
            <input id="classSeat" type="text" autocomplete="off" required placeholder="例如 10112 或 101-12">
          </label>
        </section>

        <section id="questionList" class="question-list" aria-label="練習題"></section>

        <div class="actions">
          <button class="primary" type="submit">交卷並查看解析</button>
          <button class="secondary" id="downloadResult" type="button" disabled>下載作答備份</button>
        </div>
        <p id="submitStatus" class="submit-status" role="status"></p>
      </form>

      <section id="result" class="result" hidden aria-live="polite"></section>

      <section class="participants" aria-label="已完成練習名單">
        <div class="participants-head">
          <div>
            <h2>已完成練習名單</h2>
            <p>只顯示完成狀態，不公開分數。</p>
          </div>
          <span id="participantCount" class="participant-count">-- 人完成</span>
        </div>
        <ul id="participantList" class="participant-list"></ul>
        <p id="participantStatus" class="participant-status" role="status"></p>
      </section>

      <section class="notice">
        老師提醒：若尚未設定 Google Apps Script，網頁仍可計分，但不會寫入試算表。設定完成後，學生交卷資料會自動送到 Google Sheets。
      </section>
    </main>

    <footer>
      <div class="wrap">資料來源：高一化學化學鍵講義與 108 課綱自然科學領域。</div>
    </footer>

    <script type="module" src="./chemical-bonding-app.js"></script>
  </body>
</html>
